services:
  web:
    build: .
    container_name: funkotracker_web
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    expose:
      - "5000"

  nginx:
    image: nginx:alpine
    container_name: funkotracker_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
